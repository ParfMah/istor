<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="shortcut icon" href="/favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paiement réussi — iStore Pro</title>
  <link rel="stylesheet" href="assets/css/global.css"/>
  <link rel="stylesheet" href="assets/css/components.css"/>
  <link rel="stylesheet" href="assets/css/responsive-fixes.css"/>
  <script src="assets/js/page-loader.js"></script>
  <style>
    .succes-page{
      min-height:calc(100vh - var(--header-h));
      display:flex;align-items:center;justify-content:center;
      padding:var(--space-8) var(--space-4);
    }
    .succes-card{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:var(--space-12) var(--space-8);
      max-width:560px;width:100%;text-align:center;
      box-shadow:var(--shadow-lg);
      border-top:3px solid #22c55e;
    }
    .succes-icon{
      font-size:4rem;display:block;margin-bottom:var(--space-5);
      animation:iconPop .5s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes iconPop{
      0%{transform:scale(0);opacity:0;}
      70%{transform:scale(1.2);}
      100%{transform:scale(1);opacity:1;}
    }
    .succes-card h1{
      font-family:var(--font-display);font-size:var(--text-2xl);
      font-weight:700;color:#fff;text-transform:uppercase;
      letter-spacing:.04em;margin-bottom:var(--space-4);
    }
    .succes-card p{color:var(--text-secondary);line-height:1.7;margin-bottom:var(--space-3);}
    .cmd-num{
      display:inline-block;background:rgba(201,168,76,.1);
      color:var(--gold);font-family:monospace;font-weight:800;
      font-size:var(--text-lg);padding:var(--space-2) var(--space-5);
      border-radius:var(--radius-sm);border:1px solid var(--border);
      margin:var(--space-4) 0;letter-spacing:.06em;
    }
    .succes-details{
      background:var(--bg-card2);border-radius:var(--radius-md);
      padding:var(--space-5);margin:var(--space-6) 0;
      text-align:left;border:1px solid var(--border-light);
    }
    .succes-details p{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-2);}
    .succes-details p:last-child{margin-bottom:0;}
    .succes-details strong{color:var(--gold);}
    .succes-actions{display:flex;gap:var(--space-4);justify-content:center;flex-wrap:wrap;margin-top:var(--space-6);}
    .countdown{font-size:var(--text-xs);color:var(--text-muted);margin-top:var(--space-4);}
  </style>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#C9A84C"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="iStore Pro"/>
  <link rel="apple-touch-icon" href="/assets/images/icons/icon-192.svg"/>
  <link rel="canonical" href="https://istore-pro-frontend.onrender.com/paiement-succes.html"/>
</head>
<body>

<header class="header">
  <div class="container header__inner">
    <a href="index.html" class="header__logo">
      <img src="assets/images/logo-header.svg" alt="iStore Pro" style="height:38px;width:auto;"/>
    </a>
  </div>
</header>

<main class="succes-page">
  <div class="succes-card" id="succesCard">
    <div class="loading-spinner">Vérification du paiement…</div>
  </div>
</main>

<footer class="footer footer--slim">
  <div class="footer__bottom"><p>© 2025 iStore Pro. Tous droits réservés. &nbsp;·&nbsp;
      <a href="mentions-legales.html" style="color:inherit">Mentions légales</a> &nbsp;·&nbsp;
      <a href="politique-confidentialite.html" style="color:inherit">Confidentialité</a> &nbsp;·&nbsp;
      <a href="cgu.html" style="color:inherit">CGU</a> &nbsp;·&nbsp;
      <a href="cgv.html" style="color:inherit">CGV</a> &nbsp;·&nbsp;
      <a href="contact.html" style="color:inherit">Contact</a>
    </p></div>
</footer>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const card      = document.getElementById('succesCard');
  const sessionId = new URLSearchParams(window.location.search).get('session_id');

  if (!sessionId) {
    window.location.href = 'index.html'; return;
  }

  try {
    // Vérifier la session Stripe
    let sessionData = null;
    if (Auth.isLoggedIn()) {
      try {
        sessionData = await API.get(`/stripe/session/${sessionId}`, true);
      } catch(e) { /* session déjà traitée */ }
    }

    // Webhook peut avoir un délai (cold start Render) — on considère payé si Stripe dit paid
    const isPaid = sessionData?.status === 'paid' || !sessionData;

    // Si webhook n'a pas encore créé la commande, afficher message d'attente
    if (sessionData && sessionData.status === 'paid') {
      // Polling léger pour vérifier que la commande est bien créée (max 30s)
      let orderCreated = false;
      for (let i = 0; i < 6 && !orderCreated; i++) {
        await new Promise(r => setTimeout(r, 5000));
        try {
          const orders = await API.get('/orders/mes-commandes?limit=1');
          const recentOrders = orders.orders || orders || [];
          if (recentOrders.length > 0) orderCreated = true;
        } catch {}
      }
    }
    const montant  = sessionData ? formatPrice(sessionData.amountTotal) : '';
    const email    = sessionData?.customerEmail || Auth.getUser()?.email || '';

    if (isPaid) {
      card.innerHTML = `
        <span class="succes-icon">✅</span>
        <h1>Paiement réussi !</h1>
        <p>Votre paiement a été <strong style="color:#22c55e;">confirmé</strong>.
           Votre commande est maintenant en cours de préparation.</p>

        ${montant ? `<div class="cmd-num">${montant} — Payé ✓</div>` : ''}

        <div class="succes-details">
          <p>📧 Un email de confirmation a été envoyé à <strong>${email}</strong></p>
          <p>📦 Votre commande sera expédiée dès validation de notre équipe</p>
          <p>🧾 Retrouvez vos commandes dans votre espace client</p>
        </div>

        <div class="succes-actions">
          <a href="espace-client.html" class="btn btn--primary btn--lg">
            📦 Suivre ma commande
          </a>
          <a href="catalogue.html" class="btn btn--ghost">
            Continuer mes achats
          </a>
        </div>
        <p class="countdown" id="countdown">Redirection automatique dans <span id="timer">10</span>s…</p>
      `;

      // Compte à rebours vers espace client
      let t = 10;
      const iv = setInterval(() => {
        t--;
        const el = document.getElementById('timer');
        if (el) el.textContent = t;
        if (t <= 0) {
          clearInterval(iv);
          window.location.href = 'espace-client.html';
        }
      }, 1000);
    } else {
      card.innerHTML = `
        <span class="succes-icon">⏳</span>
        <h1>Paiement en cours…</h1>
        <p>Votre paiement est en cours de traitement. Vous recevrez un email de confirmation sous quelques minutes.</p>
        <div class="succes-actions">
          <a href="espace-client.html" class="btn btn--primary">Mon espace client</a>
        </div>
      `;
    }
  } catch(e) {
    // En cas d'erreur : afficher quand même la confirmation
    card.innerHTML = `
      <span class="succes-icon">✅</span>
      <h1>Commande enregistrée !</h1>
      <p>Votre paiement a été traité. Un email de confirmation vous sera envoyé.</p>
      <div class="succes-actions">
        <a href="espace-client.html" class="btn btn--primary btn--lg">Mon espace client</a>
        <a href="catalogue.html" class="btn btn--ghost">Catalogue</a>
      </div>
    `;
  }
});
</script>
  <script src="assets/js/cookies.js"></script>
  <script src="assets/js/ui-utils.js"></script>
  <script src="assets/js/wishlist.js"></script>
</body>
</html>
